# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

exclude: '^sdk/canton/(community|daml-common-staging|base)'
repos:
- repo: local
  hooks:
    - id: hlint
      name: hlint
      language: system
      entry: "hlint -j --hint=sdk/.hlint.yaml"
      require_serial: true
      types: [haskell]
    - id: scalafmt
      name: scalafmt
      language: system
      require_serial: true
      entry: "scalafmt --config=sdk/.scalafmt.conf --respect-project-filters"
      types: [scala]
    - id: javafmt
      name: javafmt
      language: system
      require_serial: true
      entry: "javafmt --set-exit-if-changed --replace"
      types: [java]
    - id: buildifier
      name: buildifier
      language: system
      require_serial: true
      entry: "bash -c 'root=$PWD && cd sdk/ && bazel run @com_github_bazelbuild_buildtools//buildifier -- -mode=fix -v \"${@/#/$root/}\"' bash"
      types: [bazel]
    - id: copyrights
      name: copyright headers
      description: Idempotently add DA copyright headers to source files.
      language: system
      pass_filenames: false
      entry: "bash -c 'unset GIT_DIR; dade-copyright-headers update'"
      types: [text]
    - id: platform-independence-check
      name: platform-independence-check
      language: system
      pass_filenames: false
      entry: "sdk/pre-commit/platform-independence-check.sh"
    - id: yarn-lock-check
      name: yarn-lock-check
      language: system
      pass_filenames: true
      files: ^sdk/(package.json|yarn.lock)$
      entry: "sdk/pre-commit/yarn-lock-check.sh"
    - id: docs-synchronized
      name: docs synchronized
      description: Check that docs/sharable/ is updated when docs/source/ or docs/manually-written/ change
      language: system
      pass_filenames: false
      files: ^sdk/docs/(source|manually-written)/
      entry: "sdk/pre-commit/docs-synchronized-check.sh"
